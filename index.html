<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeonTrace — Hand Gesture Drawing</title>
  <meta name="description" content="Draw with neon light using hand gestures. Real-time hand tracking powered by MediaPipe.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background Grid -->
  <div class="bg-grid"></div>

  <!-- Start / Onboarding Overlay -->
  <div class="start-overlay" id="startOverlay">
    <div class="start-content">
      <div class="start-icon">✋</div>
      <h1 class="start-title">NeonTrace</h1>
      <p class="start-subtitle">
        Draw in mid-air with your hand and watch neon trails come to life.<br>
        Point your index finger to draw. Make a fist to pause.
      </p>
      <button class="start-btn" id="startBtn">
        <span>🎥</span>
        <span>Enable Camera & Start</span>
      </button>
      <div class="start-features">
        <div class="start-feature">
          <span class="feat-icon">👆</span>
          <span>Index finger draws</span>
        </div>
        <div class="start-feature">
          <span class="feat-icon">✊</span>
          <span>Fist to pause</span>
        </div>
        <div class="start-feature">
          <span class="feat-icon">✌️</span>
          <span>Two fingers to erase</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Main App Container -->
  <div class="app-container">
    <div class="canvas-viewport">
      <video id="cameraFeed" autoplay playsinline muted></video>
      <canvas id="drawCanvas"></canvas>
      <canvas id="landmarkCanvas"></canvas>
    </div>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="logo">
      <div class="logo-icon">✦</div>
      <span class="logo-text">NeonTrace</span>
    </div>
    <div class="status-badge" id="statusBadge">
      <span class="status-dot"></span>
      <span id="statusText">Initializing...</span>
    </div>
  </header>

  <!-- Drawing Mode Indicator -->
  <div class="draw-mode-indicator" id="drawModeIndicator"></div>

  <!-- Gesture Indicator -->
  <div class="gesture-indicator" id="gestureIndicator">
    <span class="gesture-icon"></span>
    <span class="gesture-text"></span>
  </div>

  <!-- Controls Panel -->
  <div class="controls-panel" id="controlsPanel">
    <button class="ctrl-btn primary" id="toggleDrawBtn" title="Toggle Drawing">
      <span class="icon">✏️</span>
      <span class="label">Draw</span>
    </button>

    <div class="ctrl-divider"></div>

    <div class="color-picker-group" id="colorPicker">
      <div class="color-swatch active" data-color="cyan" title="Cyan"></div>
      <div class="color-swatch" data-color="pink" title="Pink"></div>
      <div class="color-swatch" data-color="green" title="Green"></div>
      <div class="color-swatch" data-color="orange" title="Orange"></div>
      <div class="color-swatch" data-color="purple" title="Purple"></div>
      <div class="color-swatch" data-color="yellow" title="Yellow"></div>
      <div class="color-swatch" data-color="white" title="White"></div>
    </div>

    <div class="ctrl-divider"></div>

    <div class="brush-size-group">
      <span class="label">Size</span>
      <input type="range" class="brush-slider" id="brushSlider" min="2" max="16" value="4">
    </div>

    <div class="ctrl-divider"></div>

    <button class="ctrl-btn" id="undoBtn" title="Undo Last Stroke">
      <span class="icon">↩️</span>
      <span class="label">Undo</span>
    </button>

    <button class="ctrl-btn danger" id="clearBtn" title="Clear Canvas">
      <span class="icon">🗑️</span>
      <span class="label">Clear</span>
    </button>

    <div class="ctrl-divider"></div>

    <button class="ctrl-btn" id="saveBtn" title="Save as Image">
      <span class="icon">💾</span>
      <span class="label">Save</span>
    </button>
  </div>

  <!-- Side Panel -->
  <div class="side-panel">
    <button class="side-btn active" id="toggleLandmarks" title="Toggle Hand Landmarks">🦴</button>
    <button class="side-btn" id="toggleMirror" title="Toggle Mirror">🪞</button>
    <button class="side-btn" id="toggleCamera" title="Toggle Camera Feed">📷</button>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Finger Cursor -->
  <div class="finger-cursor" id="fingerCursor"></div>

  <!-- MediaPipe Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <script src="app.js"></script>
</body>
</html>
